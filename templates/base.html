<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iftekhar Hosting - {% block title %}Dashboard{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="nav-brand">
                <i class="fas fa-cloud-upload-alt"></i>
                <span class="red">Iftekhar</span><span class="blue"> Hosting</span>
            </div>
            <div class="nav-menu">
                {% if user.is_authenticated %}
                    <span><i class="fas fa-user-circle"></i> {{ user.username }}</span>
                    <a href="/admin/logout/" class="nav-logout">Logout</a>
                {% else %}
                    <a href="/admin/login/" class="nav-login">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>
    
    <main>
        {% block content %}{% endblock %}
    </main>
    
    <script src="{% static 'js/main.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
